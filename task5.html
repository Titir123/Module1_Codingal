<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width" />
  <title>Lists</title>
</head>

<body>
  <h2>An ordered HTML list:</h2>
  <ol>
    <li>Take a bowl</li>
    <li>Put milk, sugar, vanilla, essence and eggs</li>
    <li>Whisk it thoroghly</li>
    <li>Put it in oven</li>
    <li>Turn on timer</li>
    <li>Yummy cake is ready</li>
  </ol>

  <h2>An unordered HTML list:</h2>
  <ul>
    <li>Apple</li>
    <li>Banana</li>
    <li>Orange</li>
    <li>Cucumber</li>
  </ul>

  <h2>Definition list:</h2>
  <dl>
    <dt>Tea</dt>
    <dd>- hot drink</dd>

    <dt>Juice</dt>
    <dd>- ice drink</dd>
  </dl>
</body>
</html>
